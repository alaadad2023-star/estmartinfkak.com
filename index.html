<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School and Applicants Data</title>
</head>
<body>
    <h1>School and Applicants Data Submission</h1>
    <form id="dataForm">
        <label for="schoolName">اسم المدرسة</label><br>
        <input type="text" id="schoolName" name="schoolName"><br>
        <label for="sector">القطاع</label><br>
        <input type="text" id="sector" name="sector"><br>
        <label for="directorName">اسم المدير</label><br>
        <input type="text" id="directorName" name="directorName"><br>
        <label for="phoneNumber">رقم الهاتف</label><br>
        <input type="text" id="phoneNumber" name="phoneNumber"><br>
        <label for="schoolType">نوع المدرسة</label><br>
        <input type="text" id="schoolType" name="schoolType"><br>
        <label for="fullName">الاسم الثلاثي</label><br>

        <label for="university">الجامعة</label><br>
        <input type="text" id="university" name="university"><br>
        <label for="college">الكلية</label><br>
        <input type="text" id="college" name="college"><br>
        <label for="scientificDepartment">القسم العلمي</label><br>
        <input type="text" id="scientificDepartment" name="scientificDepartment"><br>
        <label for="workType">نوع الدوام</label><br>
        <input type="text" id="workType" name="workType"><br>
        <label for="startDate">تاريخ المباشرة</label><br>
        <input type="date" id="startDate" name="startDate"><br>
        <label for="endDate">تاريخ الانفكاك</label><br>
        <input type="date" id="endDate" name="endDate"><br>
        <label for="applicationType">نوع التطبيق</label><br>
        <input type="text" id="applicationType" name="applicationType"><br>
        <label for="submissionDate">تاريخ التعبئة</label><br>
        <input type="date" id="submissionDate" name="submissionDate"><br><br>
        <input type="submit" value="Submit">
    </form>

    <script>
        document.getElementById('dataForm').onsubmit = function(event) {
            event.preventDefault();
            const formData = new FormData(this);
            // Handle form submission and save data to Excel

            alert('Form submitted!');
        };
    </script>
</body>
</html>
