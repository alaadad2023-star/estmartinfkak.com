<!DOCTYPE html>\n<html lang="ar">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>نظام النماذج المتعددة باللغة العربية</title>\n    <style>\n        body { font-family: Arial, sans-serif; direction: rtl; }\n        .header { background-color: #f4f4f4; padding: 20px; text-align: center; }\n        .step { display: none; }\n        .active { display: block; }\n        .button { padding: 10px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }\n        .button:hover { background-color: #45a049; }\n        @media (max-width: 600px) {\n            .header { padding: 10px; }\n            .button { width: 100%; }\n        }\n    </style>\n</head>\n<body>\n    <div class="header">\n        <h1>نموذج التقديم</h1>\n        <p>وزارة التعليم</p>\n        <img src="logo.png" alt="وزارة التعليم" width="100">\n    </div>\n    <div class="steps">\n        <div class="step active" id="step1">\n            <h2>الخطوة 1: بيانات المدرسة</h2>\n            <input type="text" placeholder="اسم المدرسة">\n            <input type="text" placeholder="عنوان المدرسة">\n            <button class="button" onclick="nextStep(2)">التالي</button>\n        </div>\n        <div class="step" id="step2">\n            <h2>الخطوة 2: بيانات المتقدم</h2>\n            <input type="text" placeholder="اسم المتقدم">\n            <input type="text" placeholder="رقم الهاتف">\n            <button class="button" onclick="nextStep(1)">رجوع</button>\n            <button class="button" onclick="nextStep(3)">التالي</button>\n        </div>\n        <div class="step" id="step3">\n            <h2>الخطوة 3: مراجعة البيانات</h2>\n            <button class="button" onclick="nextStep(2)">رجوع</button>\n            <button class="button" onclick="submitData()">إرسال</button>\n        </div>\n        <div class="step" id="step4">\n            <h2>الخطوة 4: معلومات إضافية</h2>\n            <button class="button" onclick="exportToExcel()">تصدير إلى Excel</button>\n            <button class="button" onclick="nextStep(3)">رجوع</button>\n        </div>\n    </div>\n    <script>\n        let currentStep = 1;\n        function nextStep(step) {\n            document.getElementById('step' + currentStep).classList.remove('active');\n            currentStep = step;\n            document.getElementById('step' + currentStep).classList.add('active');\n        }\n        function submitData() {\n            // تخزين البيانات في localStorage\n            localStorage.setItem('schoolData', JSON.stringify({/* بيانات المدرسة */}));\n            alert('تم إرسال البيانات بنجاح!');\n        }\n        function exportToExcel() {\n            // تنفيذ وظيفة تصدير البيانات إلى Excel\n            alert('تصدير البيانات إلى Excel سيتم تنفيذه!');\n        }\n    <\/script>\n</body>\n</html>
